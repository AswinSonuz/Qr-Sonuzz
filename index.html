<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR-Sonuzz Ultimate | Design Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B5CF6;
      --bg: #030712;
      --card: #111827;
      --accent: #10b981;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0, transparent 50%), 
                        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0, transparent 50%);
      color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .studio-container {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 2rem;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 2.5rem;
      width: 100%;
      max-width: 1100px;
      box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
    }

    @media (max-width: 900px) {
      .studio-container { grid-template-columns: 1fr; }
    }

    /* Left Side: Controls */
    .controls { overflow-y: auto; max-height: 80vh; padding-right: 1rem; }
    
    h1 { font-size: 2.5rem; margin-top: 0; background: linear-gradient(to right, #fff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .section-title { font-size: 0.75rem; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin: 2rem 0 1rem; }

    .input-wrapper { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: #9ca3af; }

    select, input[type="text"], input[type="file"] {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      padding: 12px;
      border-radius: 12px;
      color: white;
      font-family: inherit;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* Right Side: Preview */
    .preview-pane {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: sticky;
      top: 0;
    }

    #canvas-container {
      background: white;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .download-btn {
      margin-top: 2rem;
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .download-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

    /* Custom Scrollbar */
    .controls::-webkit-scrollbar { width: 5px; }
    .controls::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="studio-container">
    <div class="controls">
      <h1>QR-Sonuzz <span style="color:var(--primary)">•</span></h1>
      
      <div class="section-title">1. Content & Branding</div>
      <div class="input-wrapper">
        <label>URL or Text</label>
        <input type="text" id="qr-data" placeholder="https://aswin.design" oninput="updateQR()">
      </div>
      <div class="input-wrapper">
        <label>Upload Center Logo</label>
        <input type="file" id="logo-input" accept="image/*" onchange="updateQR()">
      </div>

      <div class="section-title">2. Body Styling</div>
      <div class="grid-2">
        <div class="input-wrapper">
          <label>Dot Style</label>
          <select id="dot-style" onchange="updateQR()">
            <option value="rounded">Rounded</option>
            <option value="dots">Dots</option>
            <option value="classy">Classy</option>
            <option value="classy-rounded">Classy Rounded</option>
            <option value="square">Square</option>
          </select>
        </div>
        <div class="input-wrapper">
          <label>Color 1</label>
          <input type="color" id="color-1" value="#8B5CF6" onchange="updateQR()" style="height:45px">
        </div>
      </div>

      <div class="section-title">3. Eye (Corner) Design</div>
      <div class="grid-2">
        <div class="input-wrapper">
          <label>Corner Shape</label>
          <select id="corner-style" onchange="updateQR()">
            <option value="extra-rounded">Extra Rounded</option>
            <option value="square">Square</option>
            <option value="dot">Dot</option>
          </select>
        </div>
        <div class="input-wrapper">
          <label>Eye Color</label>
          <input type="color" id="eye-color" value="#10b981" onchange="updateQR()" style="height:45px">
        </div>
      </div>
    </div>

    <div class="preview-pane">
      <div id="canvas-container"></div>
      <button class="download-btn" onclick="downloadQR()">Download PNG (4K)</button>
      <p style="font-size: 0.7rem; color: #64748b; margin-top: 1rem;">Created by Aswin • Pro Edition</p>
    </div>
  </div>

  <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <script>
    const qrCode = new QRCodeStyling({
      width: 300,
      height: 300,
      data: "https://aswin.design",
      image: "",
      dotsOptions: { type: "rounded", color: "#8B5CF6" },
      cornersSquareOptions: { type: "extra-rounded", color: "#10b981" },
      backgroundOptions: { color: "#ffffff" },
      imageOptions: { crossOrigin: "anonymous", margin: 8, imageSize: 0.4 }
    });

    qrCode.append(document.getElementById("canvas-container"));

    function updateQR() {
      const data = document.getElementById("qr-data").value;
      const logoFile = document.getElementById("logo-input").files[0];
      const dotType = document.getElementById("dot-style").value;
      const dotColor = document.getElementById("color-1").value;
      const cornerType = document.getElementById("corner-style").value;
      const eyeColor = document.getElementById("eye-color").value;

      const options = {
        data: data || "https://aswin.design",
        dotsOptions: {
          type: dotType,
          color: dotColor
        },
        cornersSquareOptions: {
          type: cornerType,
          color: eyeColor
        }
      };

      if (logoFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
          qrCode.update({ ...options, image: e.target.result });
        };
        reader.readAsDataURL(logoFile);
      } else {
        qrCode.update(options);
      }
    }

    function downloadQR() {
      qrCode.download({ name: "Sonuzz-Ultimate-QR", extension: "png" });
    }
  </script>
</body>
</html>
