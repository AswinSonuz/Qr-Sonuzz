<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR-Sonuzz Pro | Create & Scan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B5CF6;
      --bg: #050505;
      --panel: rgba(20, 20, 25, 0.9);
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top left, #1e103d, #050505);
      color: white;
      min-height: 100vh;
    }

    /* Tab Navigation */
    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 12px 30px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .view { display: none; }
    .view.active { display: grid; }

    /* --- CREATE VIEW STYLES --- */
    .create-grid {
      grid-template-columns: 400px 1fr;
      gap: 30px;
    }

    .settings-card, .preview-card {
      background: var(--panel);
      border-radius: 32px;
      border: 1px solid var(--border);
      padding: 30px;
      backdrop-filter: blur(20px);
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
      margin: 20px 0 10px;
      font-weight: 800;
    }

    input, select {
      width: 100%;
      background: #111;
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      color: white;
      outline: none;
    }

    input:focus { border-color: var(--primary); }

    .qr-preview-box {
      background: white;
      padding: 25px;
      border-radius: 24px;
      display: inline-block;
      margin: 20px 0;
    }

    /* --- SCAN VIEW STYLES --- */
    .scan-container {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    #reader {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid var(--primary) !important;
      background: #000;
    }

    .result-card {
      margin-top: 25px;
      background: var(--glass);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--primary);
      display: none;
      word-break: break-all;
    }

    .btn-action {
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn-action:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

    @media (max-width: 900px) {
      .create-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <button class="tab-btn active" onclick="switchTab('create-view', this)">✨ Create Pro</button>
    <button class="tab-btn" onclick="switchTab('scan-view', this)">🔍 Scan Live</button>
  </nav>

  <div class="container">
    
    <div id="create-view" class="view active create-grid">
      <div class="settings-card">
        <h2 style="margin-top:0">Design Studio</h2>
        
        <div class="section-title">Content</div>
        <input type="text" id="qr-data" placeholder="Paste URL or Text" oninput="updateQR()">

        <div class="section-title">Aesthetics</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <select id="dot-type" onchange="updateQR()">
                <option value="rounded">Rounded</option>
                <option value="dots">Dots</option>
                <option value="classy">Luxury</option>
            </select>
            <input type="color" id="qr-color" value="#8B5CF6" oninput="updateQR()" style="height:45px; padding:2px">
        </div>

        <div class="section-title">Branding</div>
        <label style="font-size:0.8rem; color:#64748b">Upload Center Logo</label>
        <input type="file" id="logo-file" accept="image/*" onchange="updateQR()" style="margin-top:5px">
        
        <button class="btn-action" style="width:100%" onclick="downloadQR()">Download 4K PNG</button>
      </div>

      <div class="preview-card" style="text-align:center">
        <div class="qr-preview-box" id="qr-target"></div>
        <p style="color:#64748b">Real-time Premium Preview</p>
      </div>
    </div>

    <div id="scan-view" class="view scan-container">
      <div class="settings-card">
        <h2 style="margin-top:0">Ultimate Scanner</h2>
        <p style="color:#94a3b8; margin-bottom:25px">Point your camera or upload a QR image</p>
        
        <div id="reader"></div>

        <div id="scan-result" class="result-card">
          <span class="section-title">Scanned Content:</span>
          <p id="result-text" style="font-size:1.1rem; margin:10px 0"></p>
          <button class="btn-action" style="padding:8px 20px; font-size:0.8rem" onclick="copyResult()">Copy to Clipboard</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    // --- APP LOGIC ---
    function switchTab(tabId, btn) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');

      if (tabId === 'scan-view') {
        startScanner();
      } else {
        stopScanner();
      }
    }

    // --- GENERATOR LOGIC ---
    const qrCode = new QRCodeStyling({
      width: 300,
      height: 300,
      data: "https://qr-sonuzz.pro",
      dotsOptions: { type: "rounded", color: "#8B5CF6" },
      backgroundOptions: { color: "#ffffff" },
      imageOptions: { crossOrigin: "anonymous", margin: 10, imageSize: 0.3 }
    });
    qrCode.append(document.getElementById("qr-target"));

    function updateQR() {
      const data = document.getElementById("qr-data").value || "QR-Sonuzz";
      const color = document.getElementById("qr-color").value;
      const type = document.getElementById("dot-type").value;
      const logoFile = document.getElementById("logo-file").files[0];

      const options = { data: data, dotsOptions: { color: color, type: type } };

      if (logoFile) {
        const reader = new FileReader();
        reader.onload = (e) => qrCode.update({ ...options, image: e.target.result });
        reader.readAsDataURL(logoFile);
      } else {
        qrCode.update(options);
      }
    }

    function downloadQR() {
      qrCode.download({ name: "Sonuzz_QR", extension: "png" });
    }

    // --- SCANNER LOGIC ---
    let html5QrCode;

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };

      html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        document.getElementById('scan-result').style.display = 'block';
        document.getElementById('result-text').innerText = decodedText;
        // Optional: Vibrate on success
        if (navigator.vibrate) navigator.vibrate(100);
      });
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
      }
    }

    function copyResult() {
      const text = document.getElementById('result-text').innerText;
      navigator.clipboard.writeText(text);
      alert("Copied to clipboard!");
    }
  </script>
</body>
</html>
