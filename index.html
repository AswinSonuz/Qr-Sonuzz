<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR-Sonuzz Pro | Ultimate Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --primary-glow: rgba(124, 58, 237, 0.5);
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    h1 {
      font-weight: 800;
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    p { opacity: 0.7; font-size: 0.9rem; margin-bottom: 2rem; }

    .control-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #94a3b8;
      text-transform: uppercase;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--input-bg);
      color: white;
      outline: none;
      transition: 0.3s;
    }

    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }

    .custom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--input-bg);
      padding: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    input[type="color"] {
      border: none;
      width: 30px;
      height: 30px;
      cursor: pointer;
      background: none;
    }

    .btn-main {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }

    .btn-main:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
    }

    #canvas-container {
      margin-top: 2rem;
      background: white;
      padding: 15px;
      border-radius: 16px;
      display: inline-block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .download-area {
      margin-top: 1.5rem;
      display: none;
    }

    .credit { margin-top: 2rem; font-size: 0.8rem; color: #64748b; }
    .credit b { color: var(--primary); }
  </style>
</head>
<body>

  <div class="glass-card">
    <h1>QR-Sonuzz Pro</h1>
    <p>Premium QR generation with custom branding</p>

    <div class="control-group">
      <label>Content</label>
      <input type="text" id="qr-data" placeholder="https://example.com" oninput="updateQR()">
    </div>

    <div class="custom-row">
      <div class="control-group">
        <label>QR Color</label>
        <div class="color-picker-wrapper">
          <input type="color" id="dot-color" value="#7C3AED" onchange="updateQR()">
          <span style="font-size: 0.7rem">Dots</span>
        </div>
      </div>
      <div class="control-group">
        <label>Logo</label>
        <input type="file" id="logo-input" accept="image/*" onchange="updateQR()">
      </div>
    </div>

    <button class="btn-main" onclick="downloadQR()">Download Ultra-HD</button>

    <div id="canvas-container"></div>

    <div class="credit">Engineered with 💜 by <b>Aswin</b></div>
  </div>

  <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  
  <script>
    const qrCode = new QRCodeStyling({
      width: 250,
      height: 250,
      type: "svg",
      data: "https://aswin.com",
      image: "",
      dotsOptions: {
        color: "#7C3AED",
        type: "rounded"
      },
      backgroundOptions: {
        color: "#ffffff",
      },
      imageOptions: {
        crossOrigin: "anonymous",
        margin: 5,
        imageSize: 0.4
      }
    });

    const container = document.getElementById("canvas-container");
    qrCode.append(container);

    function updateQR() {
      const data = document.getElementById("qr-data").value;
      const dotColor = document.getElementById("dot-color").value;
      const logoFile = document.getElementById("logo-input").files[0];

      const options = {
        data: data || "https://aswin.com",
        dotsOptions: {
          color: dotColor
        }
      };

      if (logoFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
          qrCode.update({
            ...options,
            image: e.target.result
          });
        };
        reader.readAsDataURL(logoFile);
      } else {
        qrCode.update(options);
      }
    }

    function downloadQR() {
      qrCode.download({ name: "QR-Sonuzz-Pro", extension: "png" });
    }
  </script>
</body>
</html>
